<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Party Quest Photo Booth</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Party Booth">
<meta name="theme-color" content="#0B1430">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--gold:#FFC93C;--gold2:#E89200;--teal:#1EC7B4;--coral:#FF5E62;--ink:#0B1430;--navy:#10204A;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
  html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:'Fredoka','Nunito',system-ui,sans-serif;color:#fff;}
  .pixel{font-family:'Press Start 2P',monospace;}
  .screen{position:fixed;inset:0;display:none;flex-direction:column;}
  .screen.on{display:flex;}
  #start{background:radial-gradient(circle at 50% 38%,#1a2a5c 0%,#070b1c 70%);align-items:center;justify-content:center;text-align:center;cursor:pointer;}
  #start .logo{font-size:min(11vw,86px);line-height:1.4;color:var(--gold);text-shadow:4px 4px 0 #000;}
  #start .logo .q{color:var(--teal);}
  #start .tagline{font-family:'Fredoka';font-weight:600;font-size:min(4.5vw,26px);color:#9fb3e6;margin-top:18px;}
  #start .cta{margin-top:54px;font-size:min(5vw,30px);color:#fff;background:var(--coral);border:5px solid #fff;border-radius:60px;padding:26px 54px;box-shadow:0 10px 0 #b5363a;animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  #start .hint{margin-top:40px;font-family:'Fredoka';font-weight:600;color:#6c7fb0;font-size:16px;}

  #booth{background:linear-gradient(180deg,#2C6BD6,#5C9BFF 55%,#BFE0FF);}
  .topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;}
  .topbar .ttl{flex:1;font-family:'Press Start 2P';font-size:14px;color:#fff;text-shadow:2px 2px 0 var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .iconbtn{width:52px;height:52px;border:3px solid var(--navy);border-radius:14px;background:#fff;display:grid;place-items:center;cursor:pointer;flex:none;}
  .iconbtn svg{width:26px;height:26px;}
  .iconbtn .lbl{position:absolute;font-family:'Fredoka';font-weight:700;font-size:9px;color:var(--navy);margin-top:30px;}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;padding:0 12px;}
  .frameWrap{position:relative;border-radius:18px;overflow:hidden;background:#000;box-shadow:0 12px 30px rgba(0,0,0,.35);}
  .frameWrap.land{aspect-ratio:4/3;width:min(96vw,calc((100vh - 300px) * 4 / 3));}
  .frameWrap.port{aspect-ratio:3/4;width:min(96vw,calc((100vh - 300px) * 3 / 4));}
  #video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  #video.mirror{transform:scaleX(-1);}
  #overlay{position:absolute;inset:0;pointer-events:none;}
  #overlay svg{width:100%;height:100%;display:block;}
  #frameTitle{position:absolute;left:50%;top:90%;transform:translate(-50%,-50%);font-family:'Press Start 2P';font-size:clamp(11px,3vw,28px);white-space:nowrap;pointer-events:none;color:#FFE27A;}
  #countdown{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-family:'Press Start 2P';font-size:min(30vw,220px);color:#fff;text-shadow:0 0 30px rgba(0,0,0,.6);}
  #flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;}

  .controls{padding:8px 14px calc(16px + env(safe-area-inset-bottom));}
  .frames{display:flex;gap:10px;justify-content:center;overflow-x:auto;padding:4px 2px 10px;}
  .fbtn{flex:0 0 auto;border:4px solid transparent;border-radius:14px;background:#ffffff22;padding:6px;text-align:center;cursor:pointer;}
  .fbtn.active{border-color:#fff;background:#ffffff44;}
  .fbtn .mini{width:84px;aspect-ratio:4/3;border-radius:8px;overflow:hidden;background:#cdd6e6;}
  .frames.port .fbtn .mini{aspect-ratio:3/4;width:62px;}
  .fbtn .mini svg{width:100%;height:100%;display:block;}
  .fbtn .nm{font-family:'Fredoka';font-weight:700;font-size:13px;color:#fff;margin-top:5px;text-shadow:1px 1px 0 var(--navy);}
  .snaprow{display:flex;align-items:center;justify-content:center;gap:22px;}
  .snap{width:104px;height:104px;border-radius:50%;background:var(--gold);border:7px solid #fff;box-shadow:0 8px 0 var(--gold2);display:grid;place-items:center;cursor:pointer;}
  .snap:active{transform:translateY(4px);box-shadow:0 4px 0 var(--gold2);}
  .snap svg{width:48px;height:48px;}
  .snap.busy{filter:grayscale(.5);pointer-events:none;opacity:.7;}

  #review,#gallery{background:#0B1430;}
  .rv-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;min-height:0;}
  .rv-stage img{max-width:96%;max-height:100%;border-radius:14px;border:5px solid #fff;box-shadow:0 10px 30px rgba(0,0,0,.5);}
  .btnrow{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;padding:16px 16px calc(20px + env(safe-area-inset-bottom));}
  .btn{font-family:'Fredoka';font-weight:700;font-size:18px;border:4px solid var(--navy);border-radius:16px;padding:16px 26px;cursor:pointer;}
  .btn.primary{background:var(--teal);color:#fff;}
  .btn.gold{background:var(--gold);color:var(--navy);}
  .btn.ghost{background:#ffffff14;color:#fff;border-color:#ffffff44;}
  .btn.danger{background:var(--coral);color:#fff;}
  .gtitle{font-family:'Press Start 2P';font-size:16px;text-align:center;padding:18px 10px 6px;color:var(--gold);}
  .grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:14px;}
  .grid .cell{position:relative;border-radius:10px;overflow:hidden;border:3px solid #ffffff33;}
  .grid .cell img{width:100%;display:block;}
  .empty{flex:1;display:grid;place-items:center;color:#6c7fb0;font-family:'Fredoka';font-weight:600;font-size:18px;text-align:center;padding:30px;}
  .toast{position:fixed;left:50%;bottom:120px;transform:translateX(-50%);background:#000a;color:#fff;font-family:'Fredoka';font-weight:600;padding:12px 20px;border-radius:30px;opacity:0;transition:opacity .25s;pointer-events:none;font-size:16px;}
  .toast.show{opacity:1;}
  .lightbox{position:fixed;inset:0;background:#000d;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:50;padding:16px;}
  .lightbox.on{display:flex;}
  .lightbox img{max-width:96%;max-height:74%;border-radius:12px;border:5px solid #fff;}
</style>
</head>
<body>

<section id="start" class="screen on">
  <div>
    <div class="logo pixel">PARTY<br><span class="q">QUEST</span></div>
    <div class="tagline">Photo Booth</div>
    <div class="cta pixel">TAP TO START</div>
    <div class="hint">Allow camera access when asked</div>
  </div>
</section>

<section id="booth" class="screen">
  <div class="topbar">
    <div class="iconbtn" id="gearBtn" title="Host settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="#10204A" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.4 1a7 7 0 0 0-1.7-1L14.5 2h-5l-.3 2.5a7 7 0 0 0-1.7 1l-2.4-1-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.4-1a7 7 0 0 0 1.7 1l.3 2.5h5l.3-2.5a7 7 0 0 0 1.7-1l2.4 1 2-3.5-2-1.5c.1-.3.1-.7.1-1z"/></svg>
    </div>
    <div class="ttl pixel" id="boothTitle">KARY IS 6!</div>
    <div class="iconbtn" id="galleryBtn" title="Gallery">
      <svg viewBox="0 0 24 24" fill="none" stroke="#10204A" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.6" fill="#10204A"/><path d="M21 16l-5-5L5 21"/></svg>
    </div>
  </div>

  <div class="stage">
    <div class="frameWrap land" id="frameWrap">
      <video id="video" playsinline autoplay muted></video>
      <div id="overlay"></div>
      <div id="frameTitle" class="pixel">KARY IS 6!</div>
      <div id="countdown" class="pixel"></div>
      <div id="flash"></div>
    </div>
  </div>

  <div class="controls">
    <div class="frames" id="frames"></div>
    <div class="snaprow">
      <div class="iconbtn" id="flipBtn" title="Flip camera" style="width:58px;height:58px;position:relative;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#10204A" stroke-width="2"><path d="M3 12a9 9 0 0 1 15-6.7L21 7"/><path d="M21 3v4h-4"/><path d="M21 12a9 9 0 0 1-15 6.7L3 17"/><path d="M3 21v-4h4"/></svg>
      </div>
      <div class="snap" id="snap" title="Take photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#10204A" stroke-width="2.2"><path d="M4 8h3l1.5-2h7L17 8h3a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/><circle cx="12" cy="13" r="3.6"/></svg>
      </div>
      <div class="iconbtn" id="orientBtn" title="Rotate frame" style="width:58px;height:58px;position:relative;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#10204A" stroke-width="2"><rect x="3" y="5" width="13" height="9" rx="2"/><path d="M19 10v6a3 3 0 0 1-3 3H8"/><path d="M11 22l-3-3 3-3"/></svg>
        <span class="lbl" id="orientLbl">4:3</span>
      </div>
    </div>
  </div>
</section>

<section id="review" class="screen">
  <div class="rv-stage"><img id="reviewImg" alt="Your photo"></div>
  <div class="btnrow">
    <button class="btn ghost" id="retakeBtn">Retake</button>
    <button class="btn primary" id="saveBtn">Save to Photos</button>
    <button class="btn gold" id="doneBtn">Take Another</button>
  </div>
</section>

<section id="gallery" class="screen">
  <div class="gtitle pixel">PARTY GALLERY</div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="galleryEmpty" style="display:none;">No photos yet - go snap some!</div>
  <div class="btnrow">
    <button class="btn ghost" id="galBack">Back to Booth</button>
    <button class="btn primary" id="saveAll">Save All to Photos</button>
  </div>
</section>

<div class="lightbox" id="lightbox">
  <img id="lbImg" alt="">
  <div class="btnrow">
    <button class="btn ghost" id="lbClose">Close</button>
    <button class="btn primary" id="lbSave">Save to Photos</button>
    <button class="btn danger" id="lbDel">Delete</button>
  </div>
</div>

<div class="toast" id="toast"></div>

function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}
function curSvg(){return orient==='landscape'?FRAMES[curFrame].svgL:FRAMES[curFrame].svgP;}

function db(){return new Promise((res,rej)=>{const r=indexedDB.open('partyBooth',1);r.onupgradeneeded=e=>e.target.result.createObjectStore('photos',{keyPath:'id'});r.onsuccess=e=>res(e.target.result);r.onerror=()=>rej(r.error);});}
async function dbAdd(rec){const d=await db();return new Promise((res,rej)=>{const tx=d.transaction('photos','readwrite');tx.objectStore('photos').put(rec);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});}
async function dbAll(){const d=await db();return new Promise((res,rej)=>{const tx=d.transaction('photos','readonly');const q=tx.objectStore('photos').getAll();q.onsuccess=()=>res(q.result.sort((a,b)=>b.ts-a.ts));q.onerror=()=>rej(q.error);});}
async function dbDel(id){const d=await db();return new Promise((res,rej)=>{const tx=d.transaction('photos','readwrite');tx.objectStore('photos').delete(id);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});}

function setTitleText(t){TITLE=t;localStorage.setItem('booth_title',t);$('#frameTitle').textContent=t;$('#boothTitle').textContent=t;}
function renderFrame(){
  $('#overlay').innerHTML=curSvg();
  const ft=$('#frameTitle');ft.textContent=TITLE;ft.style.color=FRAMES[curFrame].titleColor;ft.style.top=ORIENT[orient].top;
  document.querySelectorAll('.fbtn').forEach((b,i)=>b.classList.toggle('active',i===curFrame));
}
function buildChooser(){
  const c=$('#frames');c.className='frames'+(orient==='portrait'?' port':'');c.innerHTML='';
  FRAMES.forEach((f,i)=>{
    const b=document.createElement('div');b.className='fbtn'+(i===curFrame?' active':'');
    b.innerHTML='<div class="mini">'+(orient==='landscape'?f.svgL:f.svgP)+'</div><div class="nm">'+f.name+'</div>';
    b.onclick=()=>{curFrame=i;renderFrame();};
    c.appendChild(b);
  });
}
function setOrient(o){
  orient=o;
  $('#frameWrap').className='frameWrap '+(o==='landscape'?'land':'port');
  $('#orientLbl').textContent=o==='landscape'?'4:3':'3:4';
  renderFrame();buildChooser();
}

async function startCamera(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing,width:{ideal:1280},height:{ideal:1280}},audio:false});
    const v=$('#video');v.srcObject=stream;v.classList.toggle('mirror',facing==='user');await v.play();
  }catch(e){ toast('Camera blocked - allow it in Settings'); throw e; }
}
async function requestWakeLock(){try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen');}}catch(e){}}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')requestWakeLock();});

let actx=null;
function blip(f,d){try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.value=f;o.connect(g);g.connect(actx.destination);g.gain.setValueAtTime(.0001,actx.currentTime);g.gain.exponentialRampToValueAtTime(.2,actx.currentTime+.01);g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}catch(e){}}

function drawCover(ctx,v,cw,ch,mirror){
  const vw=v.videoWidth||1280, vh=v.videoHeight||960;
  const s=Math.max(cw/vw,ch/vh), dw=vw*s, dh=vh*s, dx=(cw-dw)/2, dy=(ch-dh)/2;
  ctx.save(); if(mirror){ctx.translate(cw,0);ctx.scale(-1,1);} ctx.drawImage(v,dx,dy,dw,dh); ctx.restore();
}
function svgImage(svg){return new Promise((res,rej)=>{const img=new Image();img.onload=()=>res(img);img.onerror=rej;img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);});}
async function capture(){
  const o=ORIENT[orient], c=document.createElement('canvas');c.width=o.W;c.height=o.H;const ctx=c.getContext('2d');
  drawCover(ctx,$('#video'),o.W,o.H,facing==='user');
  try{const img=await svgImage(curSvg());ctx.drawImage(img,0,0,o.W,o.H);}catch(e){}
  try{await document.fonts.load("46px 'Press Start 2P'");await document.fonts.ready;}catch(e){}
  let fs=46;ctx.textAlign='center';ctx.textBaseline='middle';
  do{ctx.font=fs+"px 'Press Start 2P'";if(ctx.measureText(TITLE).width<=o.bw-56)break;fs-=2;}while(fs>16);
  ctx.fillStyle=FRAMES[curFrame].titleColor;
  ctx.fillText(TITLE,o.W/2,o.by+o.bh/2+2);
  return await new Promise(r=>c.toBlob(r,'image/png',0.95));
}
function countdown(n){return new Promise(res=>{const el=$('#countdown');el.style.display='flex';
  const step=()=>{if(n>0){el.textContent=n;blip(660,.12);n--;setTimeout(step,800);}else{el.textContent='SMILE!';blip(990,.18);setTimeout(()=>{el.style.display='none';res();},650);}};step();});}
async function doSnap(){
  const btn=$('#snap');btn.classList.add('busy');
  await countdown(3);
  const fl=$('#flash');fl.style.transition='none';fl.style.opacity='1';requestAnimationFrame(()=>{fl.style.transition='opacity .5s';fl.style.opacity='0';});
  blip(1400,.08);
  try{lastBlob=await capture();
    await dbAdd({id:'p_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),ts:Date.now(),blob:lastBlob});
    $('#reviewImg').src=URL.createObjectURL(lastBlob);show('review');
  }catch(e){toast('Could not capture - try again');}
  btn.classList.remove('busy');
}

function fileFrom(b,n){return new File([b],n,{type:'image/png'});}
async function saveOne(blob){
  const f=fileFrom(blob,'party-'+Date.now()+'.png');
  if(navigator.canShare&&navigator.canShare({files:[f]})){try{await navigator.share({files:[f],title:'Party Quest Photo'});return;}catch(e){if(e.name==='AbortError')return;}}
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=f.name;a.click();toast('Saved - long-press image to add to Photos');
}
async function saveAll(){
  const all=await dbAll();if(!all.length){toast('No photos yet');return;}
  const files=all.map((r,i)=>fileFrom(r.blob,'party-'+(i+1)+'.png'));
  if(navigator.canShare&&navigator.canShare({files})){try{await navigator.share({files,title:'Party Quest Photos'});return;}catch(e){if(e.name==='AbortError')return;}}
  toast('Saving individually...');for(const r of all){await saveOne(r.blob);}
}
async function openGallery(){
  const all=await dbAll();const grid=$('#grid');grid.innerHTML='';
  $('#galleryEmpty').style.display=all.length?'none':'grid';
  all.forEach(r=>{const url=URL.createObjectURL(r.blob);const cell=document.createElement('div');cell.className='cell';
    cell.innerHTML='<img src="'+url+'">';cell.onclick=()=>{lbId=r.id;$('#lbImg').src=url;$('#lightbox').classList.add('on');};grid.appendChild(cell);});
  show('gallery');
}

$('#start').onclick=async()=>{try{await startCamera();await requestWakeLock();setTitleText(TITLE);setOrient('landscape');show('booth');}catch(e){}};
$('#snap').onclick=doSnap;
$('#flipBtn').onclick=async()=>{facing=facing==='user'?'environment':'user';try{await startCamera();}catch(e){}};
$('#orientBtn').onclick=()=>setOrient(orient==='landscape'?'portrait':'landscape');
$('#galleryBtn').onclick=openGallery;
$('#retakeBtn').onclick=()=>show('booth');
$('#doneBtn').onclick=()=>show('booth');
$('#saveBtn').onclick=()=>{if(lastBlob)saveOne(lastBlob);};
$('#galBack').onclick=()=>show('booth');
$('#saveAll').onclick=saveAll;
$('#lbClose').onclick=()=>$('#lightbox').classList.remove('on');
$('#lbSave').onclick=async()=>{const all=await dbAll();const r=all.find(x=>x.id===lbId);if(r)saveOne(r.blob);};
$('#lbDel').onclick=async()=>{if(lbId&&confirm('Delete this photo?')){await dbDel(lbId);$('#lightbox').classList.remove('on');openGallery();}};
$('#gearBtn').onclick=()=>{const t=prompt('Banner title for photos:',TITLE);if(t!==null&&t.trim()){setTitleText(t.trim().slice(0,18));renderFrame();}};
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('touchmove',e=>{if(e.touches.length>1)e.preventDefault();},{passive:false});
</script>
</body>
</html>
